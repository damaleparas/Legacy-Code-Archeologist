# openenv.yaml — LegacyCodeArcheologist environment manifest
name: legacy_code_archeologist
version: "1.0.0"
description: >
  A Software Archeology sandbox where an AI agent debugs, documents,
  and refactors messy legacy FastAPI code to restore system functionality.
  Covers syntax repair, hidden-auth discovery, and performance optimisation.

author: "LCA Contributors"
license: MIT

tags:
  - code-repair
  - debugging
  - software-engineering
  - reinforcement-learning
  - fastapi

server:
  entrypoint: "server"
  port: 7860
  health_check: "GET /health"
  startup_timeout_seconds: 15

docker:
  image: "lca-env:latest"
  dockerfile: "Dockerfile"
  build_args: {}

tasks:
  - id: task_1_syntax_error
    difficulty: easy
    max_steps: 15
    description: "Fix a SyntaxError in a FastAPI route and verify /health returns HTTP 200."
    grader:
      type: deterministic
      entry: grader.Task1Grader

  - id: task_2_auth_header
    difficulty: medium
    max_steps: 20
    description: "Discover the X-Internal-Token from README.txt and call /process successfully."
    grader:
      type: deterministic
      entry: grader.Task2Grader

  - id: task_3_perf_optimization
    difficulty: hard
    max_steps: 25
    description: "Remove time.sleep() bottleneck; verify /compute latency < 100 ms."
    grader:
      type: deterministic
      entry: grader.Task3Grader

  - id: task_4_db_schema_mismatch
    difficulty: hard
    max_steps: 25
    description: "Inspect SQLite schema for renamed columns and update the FastAPI query accordingly."
    grader:
      type: deterministic
      entry: grader.Task4Grader

  - id: task_5_env_var_leak
    difficulty: medium
    max_steps: 15
    description: "Modify main.py to mask the DB_PASSWORD environment variable in the /env response."
    grader:
      type: deterministic
      entry: grader.Task5Grader

action_space:
  - ReadFile: { path: string }
  - EditCode: { path: string, patch: string }
  - RunTest: { command: string }
  - CallAPI: { url: string, method: string, headers: object, payload: object }

observation_space:
  file_content: string
  stdout: string
  api_response: object | null
  latency: float
  status_code: int | null
  error: string
  step_count: int
  files_modified: list[string]

reward_range: [0.01, 0.99]
terminal_reward: 0.99

evaluation:
  metrics:
    - name: success_rate
      description: "Fraction of episodes where task is solved within max_steps."
    - name: steps_to_solve
      description: "Mean step count for successful episodes."
    - name: cumulative_reward
      description: "Total reward accumulated over the episode."